[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Redirects ──────────────────────────────────────────────
[[redirects]]
  from = "/admin-login"
  to = "/admin-login.html"
  status = 200

[[redirects]]
  from = "/gf-admin-drafts"
  to = "/gf-admin-drafts.html"
  status = 200
