[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.monitor-f1]
  schedule = "*/3 * * * *"
  timeout = 60

[functions.generate-content]
  schedule = "*/5 * * * *"
  timeout = 60

[functions.fetch-timing]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-race-control]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.live-race-tweets]
  schedule = "* * * * *"
  timeout = 30

[functions.fetch-strategy]
  schedule = "*/5 * * * *"
  timeout = 30

[functions.fetch-weather]
  schedule = "*/5 * * * *"
  timeout = 30

[functions.fetch-odds]
  schedule = "0 */6 * * *"
  timeout = 30

[functions.fetch-intervals]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-laps]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-pit]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-overtakes]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-historical]
  timeout = 60

[functions.generate-article-image]
  timeout = 30
  external_node_modules = ["@napi-rs/canvas"]

[functions.fetch-telemetry]
  timeout = 30

[functions.list-sessions]
  timeout = 15

[functions.generate-picks]
  schedule = "0 5 * * *"
  timeout = 60

[functions.blog-scheduler]
  schedule = "*/15 * * * *"
  timeout = 60

[functions.generate-tweets]
  schedule = "*/10 * * * *"
  timeout = 60

[functions.post-tweet]
  schedule = "*/5 * * * *"
  timeout = 30

[functions.publish-approved]
  schedule = "*/5 * * * *"
  timeout = 30

[functions.push-schedule]
  schedule = "0 */1 * * *"
  timeout = 10

[functions.save-subscription]
  timeout = 10

[functions.send-push]
  timeout = 10

[functions.delete-subscription]
  timeout = 10

[functions.notify-draft]
  timeout = 10

[functions.approve-draft]
  timeout = 30

[[redirects]]
  from = "/driver/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/article/:slug"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/gf-admin-drafts"
  to = "/gf-admin-drafts.html"
  status = 200

[[redirects]]
  from = "/admin-login"
  to = "/admin-login.html"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
