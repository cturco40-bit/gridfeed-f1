[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"

[functions.monitor-f1]
  schedule = "*/3 * * * *"
  timeout = 60

[functions.generate-content]
  schedule = "*/5 * * * *"
  timeout = 60

[functions.generate-editorial]
  schedule = "@hourly"
  timeout = 60

[functions.generate-recap]
  schedule = "*/5 * * * *"
  timeout = 60

[functions.push-session-reminder]
  schedule = "*/5 * * * *"
  timeout = 15

[functions.generate-social]
  schedule = "0 */4 * * *"
  timeout = 15

[functions.fetch-timing]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-locations]
  schedule = "* * * * *"
  timeout = 30

[functions.fetch-race-control]
  # 1-minute backup for live-poller. live-poller does the heavy lifting at
  # 15s intervals during live sessions; this function catches any window
  # live-poller missed (function crash, cold-start delay, etc.) so CHEQUERED
  # / SC / red-flag events never go un-mirrored. Inserts dedup by date.
  schedule = "* * * * *"
  timeout = 30

[functions.live-poller]
  # Sub-minute race_control polling. Self-loops 4x at 15s intervals inside
  # one invocation so worst-case detection lag is ~15s and end-to-end tweet
  # latency stays inside the 25s target. Cron fires every minute to start a
  # fresh polling burst.
  schedule = "* * * * *"
  timeout = 60

[functions.live-race-tweets]
  schedule = "* * * * *"
  timeout = 30

[functions.fetch-strategy]
  schedule = "*/5 * * * *"
  timeout = 30

[functions.fetch-weather]
  schedule = "*/5 * * * *"
  timeout = 30

# fetch-odds disabled — picks/betting feature removed 2026-05-05.
# [functions.fetch-odds]
#   schedule = "0 */6 * * *"
#   timeout = 30

[functions.fetch-intervals]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-laps]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-pit]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-overtakes]
  schedule = "*/2 * * * *"
  timeout = 30

[functions.fetch-historical]
  timeout = 60

[functions.generate-article-image]
  timeout = 30
  external_node_modules = ["@napi-rs/canvas"]
  included_files = ["node_modules/@napi-rs/canvas-linux-x64-gnu/**", "drivers/**", "logo.png", "fonts/**"]

[functions.backfill-images]
  timeout = 300

[functions.fetch-telemetry]
  timeout = 30

[functions.list-sessions]
  timeout = 15

# Picks / betting feature removed from the product 2026-05-05. The function
# files remain in netlify/functions/ for git history but are no longer
# scheduled and have no UI surface. fetch-odds, generate-picks, settle-picks,
# approve-pick, reject-pick, list-picks, save-pick are all dead code paths.
# [functions.generate-picks]
#   schedule = "0 5 * * *"
#   timeout = 60
# [functions.settle-picks]
#   schedule = "0 4 * * 1"
#   timeout = 60
# [functions.approve-pick]
#   timeout = 10
# [functions.reject-pick]
#   timeout = 10

# blog-scheduler DISABLED 2026-04-14 — duplicated generate-editorial.js
# without any dedup / subject registry checks, producing dozens of
# duplicate drafts per day. File kept in repo for reference.
# [functions.blog-scheduler]
#   schedule = "*/15 * * * *"
#   timeout = 60

[functions.generate-tweets]
  schedule = "*/10 * * * *"
  timeout = 60

[functions.post-tweet]
  schedule = "*/5 * * * *"
  timeout = 30

[functions.publish-approved]
  schedule = "*/5 * * * *"
  timeout = 30

[functions.push-schedule]
  schedule = "0 */1 * * *"
  timeout = 10

[functions.save-subscription]
  timeout = 10

[functions.send-push]
  timeout = 10

[functions.delete-subscription]
  timeout = 10

[functions.notify-draft]
  timeout = 10

[functions.approve-draft]
  timeout = 30

[[redirects]]
  from = "/driver/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/article/:slug"
  to = "/index.html"
  status = 200

[[edge_functions]]
  path = "/article/*"
  function = "article-meta"

[[redirects]]
  from = "/gf-admin-drafts"
  to = "/gf-admin-drafts.html"
  status = 200

[[redirects]]
  from = "/admin-login"
  to = "/admin-login.html"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
