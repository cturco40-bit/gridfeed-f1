<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>GridFeed Admin — Draft Review</title>
<link rel="icon" type="image/png" href="/favicon.png" sizes="32x32"/>
<link rel="shortcut icon" href="/favicon.ico"/>
<link rel="manifest" href="/admin-manifest.json"/>
<meta name="theme-color" content="#1B1F2A"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@700;800;900&family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0E1117;--surface:#161B27;--card:#1C2333;--border:#2A3145;
  --accent:#E8002D;--gold:#F5A623;--green:#22C55E;--red:#EF4444;--blue:#3B82F6;
  --text:#E8EAF0;--dim:#8A90A0;--muted:#4A5068;
  --font:'DM Sans',sans-serif;--head:'Nunito Sans',sans-serif;
  --sidebar-w:280px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
html{height:100dvh}
body{height:100dvh}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
button{cursor:pointer;border:none;background:none;font-family:var(--font);color:var(--text)}
input,textarea,select{font-family:var(--font);color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:8px 12px;outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ═══ LOGIN ═══ */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000}
.login-box{width:340px;text-align:center}
.login-logo{font-family:var(--font);font-weight:900;font-size:32px;letter-spacing:3px;margin-bottom:32px}
.login-logo .g{color:#fff}.login-logo .f{color:var(--accent)}
.login-input{width:100%;padding:12px 16px;font-size:15px;margin-bottom:12px;text-align:center}
.login-btn{width:100%;padding:12px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;border-radius:4px;letter-spacing:1px}
.login-btn:hover{background:#c50026}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .3s}

/* ═══ HEADER ═══ */
.admin-header{
  min-height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;
  padding-top:env(safe-area-inset-top,0);
  padding-left:max(20px,env(safe-area-inset-left));
  padding-right:max(20px,env(safe-area-inset-right));
  box-sizing:content-box;
}
body{padding-top:0}
.hdr-logo{font-family:var(--font);font-weight:900;font-size:18px;letter-spacing:2px;white-space:nowrap}
.hdr-logo .g{color:#fff}.hdr-logo .f{color:var(--accent)}
.hdr-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-left:4px}
.hdr-center{flex:1;text-align:center;font-size:12px;color:var(--dim)}
.hdr-pills{display:flex;gap:8px;align-items:center}
.hdr-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;background:var(--card);border:1px solid var(--border);white-space:nowrap}
.pill-gold{border-color:var(--gold);color:var(--gold)}
.pill-green{border-color:var(--green);color:var(--green)}
.live-banner{background:linear-gradient(90deg,#E8002D,#7a0017);color:#fff;padding:12px 20px;display:none;position:sticky;top:0;z-index:50;border-bottom:2px solid #E8002D;animation:livePulse 2s ease-in-out infinite}
.live-banner.vis{display:block}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(232,0,45,0.4)}50%{box-shadow:0 0 0 8px rgba(232,0,45,0)}}
.live-banner-hdr{display:flex;align-items:center;gap:10px;font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.live-banner-dot{width:10px;height:10px;border-radius:50%;background:#fff;animation:liveBlink 1s ease-in-out infinite}
@keyframes liveBlink{0%,100%{opacity:1}50%{opacity:0.3}}
.live-tweet-card{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.live-tweet-text{flex:1;font-size:13px;line-height:1.4;white-space:pre-wrap}
.live-tweet-btn{padding:8px 14px;background:#fff;color:#E8002D;border:none;border-radius:4px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
.live-tweet-btn:hover{background:#fce0e5}
.live-tweet-btn:disabled{opacity:0.5;cursor:wait}
.pill-red{border-color:var(--red);color:var(--red)}
.pill-blue{border-color:var(--blue);color:var(--blue)}
.hdr-refresh{font-size:18px;color:var(--dim);padding:4px 8px;border-radius:4px}
.hdr-refresh:hover{background:var(--card);color:var(--text)}

/* ═══ LAYOUT ═══ */
.admin-layout{display:flex;height:calc(100dvh - 56px - env(safe-area-inset-top,0))}
.admin-sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.admin-main{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}

/* ═══ SIDEBAR TABS ═══ */
.sidebar-tabs{display:flex;flex-direction:column;gap:2px;padding:12px 10px;border-bottom:1px solid var(--border)}
.tab-btn{
  display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:4px;
  font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);
  transition:all .15s;text-align:left;
}
.tab-btn.active{background:var(--card);color:var(--text);border-left:3px solid var(--accent)}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.03)}
.tab-badge{
  margin-left:auto;font-size:10px;font-weight:700;min-width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;border-radius:10px;
  background:var(--accent);color:#fff;
}
.tab-badge:empty{display:none}

/* ═══ SIDEBAR LIST ═══ */
.sidebar-list{flex:1;overflow-y:auto;padding:6px}
.sidebar-item{
  padding:10px 12px;border-radius:4px;cursor:pointer;border-left:3px solid transparent;
  margin-bottom:2px;transition:all .1s;
}
.sidebar-item:hover{background:rgba(255,255,255,.03)}
.sidebar-item.active{background:rgba(232,0,45,.06);border-left-color:var(--accent)}
.si-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.si-priority{font-size:10px}
.si-type{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:2px;background:var(--card);color:var(--dim)}
.si-time{font-size:10px;color:var(--muted);margin-left:auto}
.si-title{font-family:var(--head);font-size:13px;font-weight:700;text-transform:uppercase;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.si-meta{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px;color:var(--muted)}
.si-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-pending{background:var(--gold)}.dot-approved{background:var(--green)}.dot-rejected{background:var(--red)}.dot-posted{background:var(--green)}.dot-failed{background:var(--red)}
.si-chars{font-size:10px;font-weight:700}
.chars-ok{color:var(--green)}.chars-warn{color:var(--red)}

/* ═══ MAIN PANEL ═══ */
.panel-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;text-align:center;padding:40px}

/* ═══ ARTICLE EDITOR ═══ */
.editor-title{
  width:100%;font-family:var(--head);font-size:28px;font-weight:800;text-transform:uppercase;
  background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px 14px;color:var(--text);outline:none;
}
.editor-title:hover{border-color:rgba(255,255,255,.2)}
.editor-title:focus{border-color:var(--accent);background:var(--bg)}
.editor-title-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;display:block}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
.tag-pill{
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid var(--border);
  color:var(--dim);transition:all .15s;
}
.tag-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.copy-subject-btn{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:3px;background:var(--card);color:var(--dim);border:1px solid var(--border);cursor:pointer;transition:all .15s;font-family:var(--font)}
.copy-subject-btn:hover{background:var(--bg);color:var(--text);border-color:var(--accent)}
.copy-subject-btn.copied{background:var(--green);color:#fff;border-color:var(--green)}
.meta-row{font-size:11px;color:var(--muted);margin:8px 0 16px;display:flex;gap:12px;flex-wrap:wrap}
.editor-grid{display:grid;grid-template-columns:1fr 320px;gap:20px}
@media(max-width:1200px){.editor-grid{grid-template-columns:1fr}}
.editor-excerpt{width:100%;min-height:60px;font-style:italic;font-size:14px;resize:vertical;margin-bottom:12px;line-height:1.6}
.editor-body{width:100%;min-height:400px;font-size:14px;line-height:1.75;resize:vertical}
.word-count{font-size:11px;margin-top:6px;font-weight:600}
.wc-ok{color:var(--green)}.wc-warn{color:var(--gold)}.wc-bad{color:var(--red)}

/* ═══ SOURCE BOX ═══ */
.source-box{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:16px}
.source-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.source-item{font-size:12px;color:var(--dim);padding:4px 0;border-bottom:1px solid var(--border)}
.source-item:last-child{border-bottom:none}

/* ═══ TIMING RADIOS ═══ */
.timing-group{margin-bottom:16px}
.timing-opt{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;cursor:pointer;color:var(--dim)}
.timing-opt input{accent-color:var(--accent)}
.timing-opt.selected{color:var(--text)}

/* ═══ ACTION BUTTONS ═══ */
.actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.act-btn{
  padding:12px 16px;border-radius:4px;font-size:13px;font-weight:700;
  letter-spacing:.5px;display:flex;align-items:center;gap:8px;justify-content:center;
  transition:all .15s;min-height:44px;
}
.act-approve{background:var(--green);color:#fff}.act-approve:hover{background:#1aab53}
.act-reject{background:transparent;color:var(--red);border:1px solid var(--red)}.act-reject:hover{background:rgba(239,68,68,.1)}
.act-save{background:transparent;color:var(--gold);border:1px solid var(--gold)}.act-save:hover{background:rgba(245,166,35,.1)}
.act-regen{background:var(--card);color:var(--dim);border:1px solid var(--border)}.act-regen:hover{color:var(--text)}
.act-next{background:var(--card);color:var(--dim);border:1px solid var(--border)}.act-next:hover{color:var(--text)}
.kb-hints{font-size:10px;color:var(--muted);margin-top:8px;text-align:center;letter-spacing:.5px}

/* ═══ TWEET EDITOR ═══ */
.tweet-textarea{width:100%;min-height:100px;font-size:16px;line-height:1.5;resize:vertical;margin-bottom:8px}
.tweet-counter{font-family:var(--head);font-size:48px;font-weight:800;text-align:center;margin:12px 0}
.tweet-counter.ok{color:var(--green)}.tweet-counter.warn{color:var(--gold)}.tweet-counter.over{color:var(--red)}
.char-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:16px}
.char-bar-fill{height:100%;border-radius:2px;transition:width .2s}
.tweet-preview{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-bottom:16px;font-size:14px;
}
.tweet-preview-header{font-size:12px;color:var(--muted);margin-bottom:8px}
.tweet-preview-header strong{color:var(--text)}
.tweet-preview-text{color:var(--text);white-space:pre-wrap;word-break:break-word;line-height:1.5}
.tweet-preview-link{color:var(--blue);font-size:12px;margin-top:6px}

/* ═══ QUEUE TABLE ═══ */
.queue-table{width:100%;border-collapse:collapse;font-size:12px}
.queue-table th{text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border)}
.queue-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.queue-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px}
.qs-success{background:rgba(34,197,94,.15);color:var(--green)}
.qs-error{background:rgba(239,68,68,.15);color:var(--red)}
.run-btn{font-size:10px;font-weight:700;color:var(--blue);cursor:pointer;padding:4px 8px;border-radius:3px;border:1px solid var(--blue)}
.run-btn:hover{background:rgba(59,130,246,.1)}

/* ═══ APPROVED/REJECTED LIST ═══ */
.history-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-icon{font-size:16px;min-width:24px;text-align:center}
.history-title{flex:1;font-weight:500}
.history-time{font-size:11px;color:var(--muted)}
.history-link{font-size:11px;color:var(--blue);cursor:pointer}
.restore-btn{font-size:10px;color:var(--gold);border:1px solid var(--gold);padding:3px 8px;border-radius:3px;cursor:pointer}
.restore-btn:hover{background:rgba(245,166,35,.1)}

/* ═══ TOAST ═══ */
.toast-container{position:fixed;bottom:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:12px 20px;border-radius:6px;font-size:13px;font-weight:500;
  background:var(--card);border:1px solid var(--border);color:var(--text);
  animation:toastIn .3s;min-width:240px;
}
.toast-success{border-color:var(--green)}.toast-error{border-color:var(--red)}.toast-info{border-color:var(--gold)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══ SPINNER ═══ */
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.skeleton{height:14px;background:var(--border);border-radius:3px;animation:skel 1.2s infinite}
@keyframes skel{0%,100%{opacity:.4}50%{opacity:.8}}

/* ═══ MOBILE BOTTOM NAV ═══ */
.mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--surface);border-top:1px solid var(--border);
  padding:6px 0 env(safe-area-inset-bottom,6px);
}
.mobile-nav-inner{display:flex;justify-content:space-around}
.mob-tab{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--muted);padding:6px 4px;border-radius:6px;min-width:56px;
  position:relative;
}
.mob-tab.active{color:var(--accent)}
.mob-tab .mob-icon{font-size:18px;line-height:1}
.mob-badge{
  position:absolute;top:0;right:6px;min-width:16px;height:16px;
  font-size:9px;font-weight:700;line-height:16px;text-align:center;
  background:var(--accent);color:#fff;border-radius:8px;padding:0 4px;
}
.mob-badge:empty{display:none}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  html,body{overflow-x:hidden;width:100%;max-width:100vw}
  .admin-sidebar{display:none}
  .admin-main{padding:12px 12px 80px;width:100%;max-width:100vw;overflow-x:hidden}
  .editor-grid{grid-template-columns:1fr;gap:12px}
  .hdr-center,.hdr-pills{display:none}
  .mobile-nav{display:block}
  .admin-header{padding:0 12px;padding-top:env(safe-area-inset-top,0);padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right))}
  .hdr-logo{font-size:16px}
  .admin-layout{height:calc(100dvh - 56px - env(safe-area-inset-top,0));max-width:100vw;overflow-x:hidden}
  /* Mobile sidebar list items */
  .mob-list{padding:0}
  .mob-list .sidebar-item{background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;padding:12px}
  /* Editor controls — bump inputs to 16px so iOS Safari doesn't auto-zoom on focus */
  .editor-title{font-size:18px;padding:10px 12px}
  .editor-excerpt,.editor-body,.tweet-textarea{font-size:16px;width:100%;max-width:100%;box-sizing:border-box}
  .editor-body{min-height:260px}
  .source-box{padding:10px 12px}
  .tag-pill{font-size:10px;padding:4px 8px}
  .actions{flex-wrap:wrap;gap:6px}
  .act-btn{flex:1;min-width:120px;font-size:12px;padding:10px 12px}
  .meta-row{font-size:10px;gap:8px}
  /* Image preview side-by-side -> stacked */
  #edImgBody > div[style*="grid-template-columns"]{grid-template-columns:1fr !important}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><span class="g">GRID</span><span class="f">FEED</span></div>
    <form onsubmit="event.preventDefault();doLogin();" autocomplete="off">
    <input type="text" name="username" value="admin" autocomplete="username" style="position:absolute;opacity:0;height:0;width:0;pointer-events:none" tabindex="-1" aria-hidden="true"/>
    <input type="password" class="login-input" id="loginPw" placeholder="Password" autocomplete="current-password"/>
    <button type="submit" class="login-btn">Access Drafts</button>
    </form>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="appContainer" style="display:none;height:100vh;display:none;flex-direction:column">

<!-- HEADER -->
<div class="admin-header">
  <div class="hdr-logo"><span class="g">GRID</span><span class="f">FEED</span><span class="hdr-sub">Draft Review</span></div>
  <div class="hdr-center" id="hdrCenter"></div>
  <div class="hdr-pills" id="hdrPills"></div>
  <button onclick="registerPush()" style="font-size:11px;padding:4px 10px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer" id="pushBtn">&#128276; Notifications</button>
  <button class="hdr-refresh" onclick="refreshAll()" title="Refresh">&#8634;</button>
</div>

<!-- LIVE MODE banner: shows recently auto-posted live race tweets -->
<div class="live-banner" id="liveBanner">
  <div class="live-banner-hdr"><span class="live-banner-dot"></span>LIVE RACE \u2014 <span id="liveBannerCount">0</span> auto-posted in last 30 min</div>
  <div id="liveBannerList"></div>
</div>

<!-- LAYOUT -->
<div class="admin-layout">
  <!-- SIDEBAR -->
  <div class="admin-sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" data-tab="articles" onclick="switchAdminTab('articles',this)">&#128196; Articles <span class="tab-badge" id="badgeArticles"></span></button>
      <button class="tab-btn" data-tab="tweets" onclick="switchAdminTab('tweets',this)">&#128038; Tweets <span class="tab-badge" id="badgeTweets"></span></button>
      <button class="tab-btn" data-tab="picks" onclick="switchAdminTab('picks',this)">&#127942; Picks <span class="tab-badge" id="badgePicks"></span></button>
      <button class="tab-btn" data-tab="raceblog" onclick="switchAdminTab('raceblog',this)">&#127937; Race Blog <span class="tab-badge" id="badgeRaceBlog"></span></button>
      <button class="tab-btn" data-tab="published" onclick="switchAdminTab('published',this)">&#9999;&#65039; Published</button>
      <button class="tab-btn" data-tab="approved" onclick="switchAdminTab('approved',this)">&#9989; Approved</button>
      <button class="tab-btn" data-tab="rejected" onclick="switchAdminTab('rejected',this)">&#10060; Rejected</button>
      <button class="tab-btn" data-tab="queue" onclick="switchAdminTab('queue',this)">&#9881; Queue</button>
    </div>
    <div class="sidebar-list" id="sidebarList"><div style="padding:20px;text-align:center"><div class="spin"></div></div></div>
  </div>

  <!-- MAIN -->
  <div class="admin-main" id="mainPanel"><div class="panel-empty">Select an item from the sidebar</div></div>
</div>
</div>

<!-- TOASTS -->
<!-- MOBILE BOTTOM NAV -->

  <div class="mobile-nav-inner">

/* ═══ DATA LOADING ═══ */
async function refreshAll(){
  // Preserve any unsaved edits across a refresh
  const pending = {
    edTitle: document.getElementById('edTitle')?.value,
    edBody: document.getElementById('edBody')?.value,
    edExcerpt: document.getElementById('edExcerpt')?.value,
    twText: document.getElementById('twText')?.value,
    rbEdHead: document.getElementById('rbEdHead')?.value,
    rbEdBody: document.getElementById('rbEdBody')?.value,
    pubEdTitle: document.getElementById('pubEdTitle')?.value,
    pubEdBody: document.getElementById('pubEdBody')?.value,
    pubEdExcerpt: document.getElementById('pubEdExcerpt')?.value,
    pkDriver: document.getElementById('pkDriver')?.value,
    pkOdds: document.getElementById('pkOdds')?.value,
    pkBook: document.getElementById('pkBook')?.value,
    pkAnalysis: document.getElementById('pkAnalysis')?.value,
    pkConf: document.getElementById('pkConf')?.value,
    pkEdge: document.getElementById('pkEdge')?.value,
  };
  await Promise.all([loadDrafts(),loadTweets(),loadSyncLogs(),loadTopics(),loadRaceBlogEntries(),loadPublishedArticles(),loadPicks()]);
  renderHeader();
  renderSidebar();
  if(selectedId){
    renderMainForSelected();
    // Restore unsaved edits (only if the field exists in the new DOM AND had a value)
    Object.entries(pending).forEach(([id, val]) => {
      if (val == null) return;
      const el = document.getElementById(id);
      if (el && el.value !== val) el.value = val;
    });
  }
}

async function loadDrafts(){
  const{data}=await sb.from('content_drafts').select('*').order('created_at',{ascending:false});
  drafts=data||[];
}
async function loadTweets(){
  const{data}=await sb.from('tweets').select('*').order('created_at',{ascending:false});
  tweets=data||[];
}
async function loadRaceBlogEntries(){
  try{
    const{data}=await sb.from('race_blog_entries').select('*').order('created_at',{ascending:false}).limit(100);
    raceBlog=data||[];
  }catch(e){raceBlog=[]}
}
async function loadPublishedArticles(){
  try{
    const{data}=await sb.from('articles').select('id,title,slug,body,excerpt,tags,published_at').eq('status','published').order('published_at',{ascending:false}).limit(100);
    publishedArticles=data||[];
  }catch(e){publishedArticles=[]}
}
async function loadSyncLogs(){
  const{data}=await sb.from('sync_log').select('*').order('created_at',{ascending:false}).limit(50);
  syncLogs=data||[];
}
async function loadTopics(){
  const{data}=await sb.from('content_topics').select('*').eq('status','pending').order('priority',{ascending:true}).limit(20);
  topics=data||[];
}
async function loadPicks(){
  // Route through list-picks (service role) because the anon key can't see
  // unlocked drafts — RLS hides them by design.
  try{
    const res=await fetch('/.netlify/functions/list-picks');
    const data=await res.json();
    picks=data?.picks||[];
  }catch(e){picks=[]}
}

/* ═══ HEADER ═══ */
function renderHeader(){
  const now=new Date();
  const dayStr=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const nextRace=getNextRaceInfo();
  document.getElementById('hdrCenter').textContent=`${dayStr}${nextRace}`;

  const todayStart=new Date();todayStart.setHours(0,0,0,0);
  const pendingDrafts=drafts.filter(d=>d.review_status==='pending').length;
  const approvedToday=drafts.filter(d=>d.review_status==='approved'&&new Date(d.reviewed_at)>=todayStart).length;
  const rejectedToday=drafts.filter(d=>d.review_status==='rejected'&&new Date(d.reviewed_at)>=todayStart).length;
  const pendingTweets=tweets.filter(t=>t.status==='pending').length;

  const pendingBlog=raceBlog.filter(b=>b.status==='pending').length;
  document.getElementById('hdrPills').innerHTML=`
    <span class="hdr-pill pill-gold">${pendingDrafts} Pending</span>
    <span class="hdr-pill pill-green">${approvedToday} Approved</span>
    <span class="hdr-pill pill-red">${rejectedToday} Rejected</span>
    <span class="hdr-pill pill-blue">${pendingTweets} Tweets</span>
    ${pendingBlog?`<span class="hdr-pill pill-red">${pendingBlog} Blog</span>`:''}`;

  document.getElementById('badgeArticles').textContent=pendingDrafts||'';
  document.getElementById('badgeTweets').textContent=pendingTweets||'';
  const pendingPicks=picks.filter(p=>!p.locked_at).length;
  const bp=document.getElementById('badgePicks');if(bp)bp.textContent=pendingPicks||'';
  const bb=document.getElementById('badgeRaceBlog');if(bb)bb.textContent=pendingBlog||'';
  // Mobile badges
  const ma=document.getElementById('mobBadgeArticles');if(ma)ma.textContent=pendingDrafts||'';
  const mt=document.getElementById('mobBadgeTweets');if(mt)mt.textContent=pendingTweets||'';
  renderLiveBanner();
}

function renderLiveBanner(){
  const banner=document.getElementById('liveBanner');if(!banner)return;
  // Show live tweets posted in the last 30 minutes (informational — they auto-post)
  const cutoff=Date.now()-30*60*1000;
  const liveTweets=tweets.filter(t=>{
    if(t.tweet_type!=='live_race')return false;
    const ts=new Date(t.posted_at||t.created_at).getTime();
    return ts>=cutoff;
  }).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(!liveTweets.length){banner.classList.remove('vis');return}
  banner.classList.add('vis');
  document.getElementById('liveBannerCount').textContent=liveTweets.length;
  document.getElementById('liveBannerList').innerHTML=liveTweets.map(t=>{
    const isPosted=t.status==='posted';
    const isFailed=t.status==='failed';
    const statusBadge=isPosted?'\u2713 POSTED':isFailed?'\u26a0 FAILED':'\u23f3 QUEUED';
    return`<div class="live-tweet-card">
      <div class="live-tweet-text">${esc(t.tweet_text||'')}</div>
      <div style="font-size:11px;font-weight:800;color:#fff;flex-shrink:0">${statusBadge}</div>
    </div>`;
  }).join('');
}

async function approveLiveTweet(id,btn){
  btn.disabled=true;btn.textContent='Posting...';
  try{
    const res=await fetch('/.netlify/functions/approve-tweet',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id})
    });
    const data=await res.json();
    if(data.error){toast('Failed: '+data.error,'error');btn.disabled=false;btn.textContent='\u2713 Post Now';return}
    toast(data.posted?'\u2713 Live tweet posted':'\u2713 Approved (post pending)','success');
    await refreshAll();
  }catch(e){toast('Failed: '+e.message,'error');btn.disabled=false;btn.textContent='\u2713 Post Now'}
}

function getNextRaceInfo(){
  const races=[
    {name:'Miami GP',round:4,date:'2026-05-03'},
    {name:'Canadian GP',round:5,date:'2026-05-24'},
  ];
  const now=Date.now();
  for(const r of races){
    const d=new Date(r.date).getTime();
    if(d>now){const days=Math.ceil((d-now)/864e5);return ` \u00b7 Round ${r.round} ${r.name} in ${days} days`;}
  }
  return '';
}

function togglePubTag(el,t){el.classList.toggle('active')}

async function copyPublishedBody(btn){
  const body=document.getElementById('pubEdBody')?.value?.trim()||'';
  if(!body)return;
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(body);
    }else{
      const ta=document.createElement('textarea');
      ta.value=body;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    }
    if(btn){const orig=btn.innerHTML;btn.innerHTML='\u2713 Copied';btn.classList.add('copied');setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('copied')},1500)}
  }catch(e){console.warn('Copy failed',e)}
}
function getPubTags(){return Array.from(document.querySelectorAll('#pubEdTags .tag-pill.active')).map(el=>el.textContent.trim())}

async function savePublished(id){
  const title=document.getElementById('pubEdTitle')?.value?.trim();
  const body=document.getElementById('pubEdBody')?.value?.trim();
  const excerpt=document.getElementById('pubEdExcerpt')?.value?.trim();
  const tags=getPubTags();
  if(!title){toast('Title required','error');return}
  if(!body){toast('Body required','error');return}
  toast('Saving...','info');
  try{
    const{error}=await sb.from('articles').update({title,body,excerpt,tags}).eq('id',id);
    if(error){toast('Save failed: '+error.message,'error');return}
    toast('\u2713 Saved: '+title,'success');
    await refreshAll();
  }catch(e){toast('Save failed: '+e.message,'error')}
}

function renderArticleSidebar(el){
  const pending=drafts.filter(d=>d.review_status==='pending');
  const sorted=pending.sort((a,b)=>{
    const pa=priorityOf(a),pb=priorityOf(b);
    if(pa!==pb)return pb-pa;
    return new Date(b.created_at)-new Date(a.created_at);
  });
  if(!sorted.length){
    el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">All clear \u2014 no pending drafts.<br><br>Next generation runs in ~${nextCronMin('generate-content')} min.</div>`;
    return;
  }
  el.innerHTML=sorted.map(d=>`
    <div class="sidebar-item ${selectedId===d.id?'active':''}" onclick="selectDraft('${d.id}')">
      <div class="si-top">
        <span class="si-priority">${priorityIcon(d)}</span>
        <span class="si-type">${d.content_type||'draft'}</span>
        <span class="si-time">${timeAgo(d.created_at)}</span>
      </div>
      <div class="si-title">${esc(d.title||'Untitled')}</div>
      <div class="si-meta"><div class="si-dot dot-pending"></div>GridFeed Pipeline</div>
    </div>`).join('');
}

function renderTweetSidebar(el){
  const pending=tweets.filter(t=>t.status==='pending');
  if(!pending.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No pending tweets.</div>';return}
  el.innerHTML=pending.map(t=>{
    const len=(t.tweet_text||'').length;
    return`<div class="sidebar-item ${selectedId===t.id?'active':''}" onclick="selectTweet('${t.id}')">
      <div class="si-top">
        <span class="si-type">tweet</span>
        <span class="si-chars ${len<=270?'chars-ok':'chars-warn'}">${len}/280</span>
        <span class="si-time">${timeAgo(t.created_at)}</span>
      </div>
      <div class="si-title" style="font-family:var(--font);text-transform:none;font-size:12px">${esc((t.tweet_text||'').slice(0,70))}${(t.tweet_text||'').length>70?'...':''}</div>
      <div class="si-meta"><div class="si-dot dot-pending"></div></div>
    </div>`}).join('');
}

function renderApprovedSidebar(el){
  const todayStart=new Date();todayStart.setHours(0,0,0,0);
  const appDrafts=drafts.filter(d=>d.review_status==='approved'&&new Date(d.reviewed_at||d.created_at)>=todayStart);
  const appTweets=tweets.filter(t=>(t.status==='approved'||t.status==='posted')&&new Date(t.created_at)>=todayStart);
  const all=[
    ...appDrafts.map(d=>({type:'article',title:d.title,time:d.reviewed_at||d.created_at,slug:d.published_article_id})),
    ...appTweets.map(t=>({type:'tweet',title:(t.tweet_text||'').slice(0,60),time:t.posted_at||t.created_at})),
  ].sort((a,b)=>new Date(b.time)-new Date(a.time));
  if(!all.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">Nothing approved today.</div>';return}
  el.innerHTML=all.map(i=>`<div class="sidebar-item">
    <div class="history-row" style="border:none;padding:0">
      <span class="history-icon">${i.type==='article'?'\ud83d\udcc4':'\ud83d\udc26'}</span>
      <span class="history-title" style="font-size:12px">${esc(i.title||'')}</span>

async function copyDraftSubject(id,btn){
  // Copies the article BODY (the subject matter you paste into Claude for
  // review). Title and tags stay editable separately.
  const body=document.getElementById('edBody')?.value?.trim()||'';
  if(!body)return;
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(body);
    }else{
      const ta=document.createElement('textarea');
      ta.value=body;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    }
    if(btn){
      const orig=btn.innerHTML;
      btn.innerHTML='\u2713 Copied';
      btn.classList.add('copied');
      setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('copied')},1500);
    }
  }catch(e){console.warn('Copy failed',e)}
}

// Shared resolver: offset string -> ISO timestamp in the future (or null for 'now').
// Used by both article and tweet schedulers so the option set stays in sync.
function resolveSchedule(v){
  const d=new Date();
  if(v==='15m'){d.setMinutes(d.getMinutes()+15);return d.toISOString()}
  if(v==='30m'){d.setMinutes(d.getMinutes()+30);return d.toISOString()}
  if(v==='1h'){d.setHours(d.getHours()+1);return d.toISOString()}
  if(v==='2h'){d.setHours(d.getHours()+2);return d.toISOString()}
  if(v==='tomorrow'){d.setDate(d.getDate()+1);d.setHours(7,0,0,0);return d.toISOString()}
  return null; // 'now' / default / unknown
}
function getPublishTime(){
  return resolveSchedule(document.querySelector('#edTiming input[name="timing"]:checked')?.value);
}
function getTweetPostTime(){
  return resolveSchedule(document.querySelector('#twTiming input[name="twtiming"]:checked')?.value);
}

function makeSlug(title){
  return title.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').slice(0,80)+'-'+Date.now().toString(36);
}

/* ═══ ARTICLE ACTIONS ═══ */
async function approveDraft(id){
  const title=document.getElementById('edTitle')?.value?.trim();
  const body=document.getElementById('edBody')?.value?.trim();
  const excerpt=document.getElementById('edExcerpt')?.value?.trim();
  const tags=getSelectedTags();
  if(!body){toast('Article body is empty','error');return}

  const publishAt=getPublishTime();
  toast(publishAt?'Scheduling...':'Publishing...','info');
  try{
    const res=await fetch('/.netlify/functions/approve-draft',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,title,articleBody:body,excerpt,tags,publishAt})
    });
    const data=await res.json();
    if(data.error){toast((publishAt?'Schedule':'Publish')+' failed: '+data.error,'error');return}
    if(data.scheduled){
      const when=new Date(data.scheduled_publish_at||publishAt).toLocaleString();
      toast('\u23f1 Scheduled for '+when+': '+title,'success');
    }else{
      toast('\u2713 Published: '+title,'success');
    }
    setTimeout(()=>{nextDraft()},1500);
    await refreshAll();
  }catch(e){toast('Publish failed: '+e.message,'error')}
}

async function rejectDraft(id){
  await fetch('/.netlify/functions/reject-draft',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,type:'draft'})}).catch(()=>{});
  toast('Rejected','error');
  nextDraft();
  await refreshAll();
}

async function saveDraft(id){
  const title=document.getElementById('edTitle')?.value;
  const body=document.getElementById('edBody')?.value;
  const excerpt=document.getElementById('edExcerpt')?.value;
  const tags=getSelectedTags();
  const{error}=await sb.from('content_drafts').update({title,body,excerpt,tags}).eq('id',id);
  if(error){toast('Save failed: '+error.message,'error');return}
  toast('Edits saved','info');
  await refreshAll();
}

async function restoreDraft(id){
  await sb.from('content_drafts').update({review_status:'pending',reviewed_at:null,reviewed_by:null}).eq('id',id);
  toast('Restored to pending','info');
  await refreshAll();
}

async function regenDraft(){
  toast('Regenerating...','info');
  try{await fetch('/.netlify/functions/generate-content');toast('Regeneration triggered','success')}
  catch(e){toast('Regen failed','error')}
  setTimeout(()=>refreshAll(),5000);
}

function nextDraft(){
  const pending=drafts.filter(d=>d.review_status==='pending');
  const idx=pending.findIndex(d=>d.id===selectedId);
  const next=pending[idx+1]||pending[0];
  if(next)selectDraft(next.id);
  else{selectedId=null;renderSidebar();renderMainDefault()}

          </div>
          <div>
            <label style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Odds (dec)</label>
            <input id="pkOdds" type="number" step="0.01" min="1.01" value="${odds}" ${ro} style="width:100%;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font)"/>
          </div>
          <div>
            <label style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Bookmaker</label>
            <input id="pkBook" value="${esc(p.bookmaker||'')}" ${ro} style="width:100%;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font)"/>
          </div>
        </div>
        <label class="editor-title-label" style="margin-top:12px">Analysis</label>

function renderPicksTracker(){
  const main=document.getElementById('mainPanel');
  const settled=picks.filter(p=>p.locked_at&&(p.status==='won'||p.status==='lost'||p.status==='push'));
  const won=settled.filter(p=>p.status==='won').length;
  const lost=settled.filter(p=>p.status==='lost').length;
  const push=settled.filter(p=>p.status==='push').length;
  const pendingLocked=picks.filter(p=>p.locked_at&&p.status==='pending').length;
  const pendingDraft=picks.filter(p=>!p.locked_at).length;
  // ROI on 1u flat stakes: sum((won ? (odds-1) : -1)) / units wagered
  let units=0,profit=0;
  for(const p of settled){
    if(p.status==='push'){continue}
    units+=1;
    const dec=parseFloat(p.odds_at_pick||p.odds_decimal)||0;
    profit+=p.status==='won'?(dec-1):-1;
  }
  const roi=units>0?((profit/units)*100).toFixed(1):'—';
  main.innerHTML=`
    <h3 style="font-family:var(--head);font-size:20px;margin-bottom:12px">Picks Dashboard</h3>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px">
      <div class="source-box"><div class="source-label">Drafts</div><div style="font-size:28px;font-weight:900;color:var(--gold)">${pendingDraft}</div></div>
      <div class="source-box"><div class="source-label">Locked</div><div style="font-size:28px;font-weight:900;color:var(--accent)">${pendingLocked}</div></div>
      <div class="source-box"><div class="source-label">Wins</div><div style="font-size:28px;font-weight:900;color:var(--green)">${won}</div></div>
      <div class="source-box"><div class="source-label">Losses</div><div style="font-size:28px;font-weight:900;color:var(--red)">${lost}</div></div>
      <div class="source-box"><div class="source-label">ROI</div><div style="font-size:28px;font-weight:900;color:${profit>=0?'var(--green)':'var(--red)'}">${roi===''||roi==='—'?'—':(profit>=0?'+':'')+roi+'%'}</div></div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <button class="act-btn act-regen" onclick="regenPicks()">\u21ba Generate picks</button>
      <button class="act-btn" style="background:var(--card);color:var(--text);border:1px solid var(--border)" onclick="refreshOdds()">\u{1F4E1} Refresh odds</button>
      ${pendingDraft>0?`<button class="act-btn act-approve" onclick="approveAllPicks()">\u2713 Approve all ${pendingDraft}</button>`:''}
    </div>
    <div class="panel-empty">${pendingDraft>0?'Click a pick to review, or Approve all to lock every draft.':'No drafts waiting. Generate picks or wait for the next cron run.'}</div>`;
}

async function approvePick(id){
  const payload={
    id,
    driver_name: document.getElementById('pkDriver')?.value?.trim(),
    pick_type:   document.getElementById('pkType')?.value,
    odds_decimal: parseFloat(document.getElementById('pkOdds')?.value),
    bookmaker:   document.getElementById('pkBook')?.value?.trim(),
    analysis:    document.getElementById('pkAnalysis')?.value,
    confidence:  parseFloat(document.getElementById('pkConf')?.value),
    edge:        parseFloat(document.getElementById('pkEdge')?.value),
  };
  try{
    const res=await fetch('/.netlify/functions/approve-pick',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(data.error){toast('Approve failed: '+data.error,'error');return}
    toast('\u2713 Pick locked','success');
    selectedId=null;await refreshAll();
  }catch(e){toast('Approve failed: '+e.message,'error')}
}

async function rejectPick(id){
  try{
    const res=await fetch('/.netlify/functions/reject-pick',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
    const data=await res.json();
    if(data.error){toast('Reject failed: '+data.error,'error');return}
    toast('Rejected','info');
    selectedId=null;await refreshAll();
  }catch(e){toast('Reject failed: '+e.message,'error')}
}

async function savePickDraft(id){
  // Save routes through save-pick.js so edits run with the service role and
  // bypass RLS. betting_picks has no public update policy by design.
  const payload={
    id,
    driver_name: document.getElementById('pkDriver')?.value?.trim(),
    pick_type:   document.getElementById('pkType')?.value,
    odds_decimal: parseFloat(document.getElementById('pkOdds')?.value),
    bookmaker:   document.getElementById('pkBook')?.value?.trim(),
    analysis:    document.getElementById('pkAnalysis')?.value,
    confidence:  parseFloat(document.getElementById('pkConf')?.value),
    edge:        parseFloat(document.getElementById('pkEdge')?.value),
  };
  try{
    const res=await fetch('/.netlify/functions/save-pick',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(data.error){toast('Save failed: '+data.error,'error');return}
    toast('Edits saved','info');await refreshAll();
  }catch(e){toast('Save failed: '+e.message,'error')}
}

async function approveAllPicks(){
  // Lock every unlocked draft in the current picks list. Each call goes
  // through approve-pick so the DB trigger gets to enforce immutability
  // consistently — no shortcut UPDATEs that could bypass audit.
  const pending=picks.filter(p=>!p.locked_at);
  if(!pending.length){toast('No drafts to approve','info');return}
  toast(`Approving ${pending.length} picks...`,'info');
  let ok=0,fail=0;
  for(const p of pending){
    try{
      const res=await fetch('/.netlify/functions/approve-pick',{
        method:'POST',headers:{'Content-Type':'application/json'},
        // Pass id only — the function already has all the fields stored
        // from generate-picks. No admin edits to apply.
        body:JSON.stringify({id:p.id})
      });
      const data=await res.json();
      if(data.error){fail++;console.warn('[approveAll]',p.id,data.error);continue}
      ok++;
    }catch(e){fail++;console.warn('[approveAll]',p.id,e.message)}
  }
  toast(`\u2713 Locked ${ok}${fail?` \u00b7 ${fail} failed`:''}`,fail?'error':'success');
  selectedId=null;await refreshAll();
}

async function regenPicks(){
  toast('Generating picks...','info');
  try{
    const res=await fetch('/.netlify/functions/generate-picks');
    const data=await res.json().catch(()=>({}));
    if(data.error){toast('Regen failed: '+data.error,'error');return}
    toast(`Generated ${data.picks||0} draft picks`,'success');
    await refreshAll();
  }catch(e){toast('Regen failed: '+e.message,'error')}
}

async function refreshOdds(){

/* ═══ QUEUE PANEL ═══ */

  const main=document.getElementById('mainPanel');

  syncLogs.forEach(l=>{if(!logMap[l.function_name])logMap[l.function_name]=l});

  main.innerHTML=`
    <h3 style="font-family:var(--head);font-size:20px;margin-bottom:16px">Content Pipeline</h3>
    <table class="queue-table">
      <thead><tr><th>Function</th><th>Last Run</th><th>Result</th><th>Message</th><th></th></tr></thead>
      <tbody>${CRONS.map(c=>{
        const log=logMap[c.name];
        const ago=log?timeAgo(log.created_at):'Never';
        const status=log?.status||'—';
        const msg=(log?.message||'').slice(0,60);
        return`<tr>
          <td style="font-weight:600">${c.label}</td>
          <td style="color:var(--dim)">${ago}</td>
          <td><span class="queue-status ${status==='success'?'qs-success':'qs-error'}">${status}</span></td>
          <td style="color:var(--dim);font-size:11px">${esc(msg)}</td>
          <td><button class="run-btn" onclick="runFunction('${c.name}',this)">\u25b6 Run</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
    ${topics.length?`
      <h3 style="font-family:var(--head);font-size:18px;margin:24px 0 12px">${topics.length} Topics Queued</h3>
      ${topics.map(t=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--dim)">
        <span style="font-weight:700;color:var(--text)">${esc(t.content_type||'topic')}</span> \u2014 ${esc(t.topic||'')}
        <span style="color:var(--muted);margin-left:8px">${timeAgo(t.created_at)}</span>
      </div>`).join('')}
    `:''}`;
}

async function runFunction(name,btn){
  btn.textContent='\u23f3';btn.disabled=true;
  try{
    const res=await fetch(`/.netlify/functions/${name}`);
    const json=await res.json();
    toast(`${name}: ${json.ok?'Success':'Error'}`,'success');
  }catch(e){toast(`${name} failed`,'error')}
  btn.textContent='\u25b6 Run';btn.disabled=false;
  setTimeout(()=>refreshAll(),2000);
}

/* ═══ KEYBOARD ═══ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(!selectedId)return;
  if(e.key==='a'||e.key==='A'){
    e.preventDefault();
    if(activeTab==='articles')document.querySelector('.act-approve')?.click();
    if(activeTab==='tweets')document.querySelector('.act-approve')?.click();
  }
  if(e.key==='r'||e.key==='R'){e.preventDefault();document.querySelector('.act-reject')?.click()}
  if(e.key==='s'||e.key==='S'){e.preventDefault();document.querySelector('.act-save')?.click()}
  if(e.key==='g'||e.key==='G'){e.preventDefault();document.querySelector('.act-regen')?.click()}
  if(e.key==='Tab'&&activeTab==='articles'){e.preventDefault();nextDraft()}
});

/* ═══ UTILS ═══ */
function timeAgo(d){if(!d)return'—';const ms=Date.now()-new Date(d).getTime(),m=Math.floor(ms/6e4),h=Math.floor(ms/36e5),dy=Math.floor(ms/864e5);return m<1?'just now':m<60?m+'m ago':h<24?h+'h ago':dy+'d ago'}
function wordCount(s){return s?s.trim().split(/\s+/).filter(Boolean).length:0}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function isToday(d){if(!d)return false;const t=new Date(),x=new Date(d);return t.toDateString()===x.toDateString()}
function priorityOf(d){const t=(d.tags||[]).join(' ')+(d.content_type||'');if(t.includes('BREAKING')||t.includes('breaking'))return 3;return 1}
function priorityIcon(d){const p=priorityOf(d);return p>=3?'\ud83d\udd34':'\u26aa'}

function nextCronMin(name){
  const c=CRONS.find(x=>x.name===name);if(!c)return'?';
  const parts=c.cron.split(' ');
  if(parts[0].startsWith('*/')){return parts[0].replace('*/','');}
  return'60';
}

function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className='toast toast-'+type;
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

/* ═══ PUSH NOTIFICATIONS ═══ */
const VAPID_PUBLIC_KEY='BGiNH3DDw7QMuFmiB_Qxgn4aEPLl4k5MW9T27MzcUCjv5jxi5wy7Bb74Fdn8J2PX1NzL-0bPC2lk3EngE1k4rII';

function urlBase64ToUint8Array(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
  return arr;
}

function updateAdminPushBtn(on){
  const btn=document.getElementById('pushBtn');if(!btn)return;
  if(on){btn.textContent='Notifications ON';btn.style.background='var(--green)'}
  else{btn.textContent='Notifications OFF';btn.style.background='var(--accent)'}
}
async function registerPush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){
    toast('Push not supported on this browser','error');return;
  }
  try{
    // Share the same SW as the public site — otherwise the two registrations
    // collide on the root scope and whichever loaded last wipes the other's
    // subscription. app-sw.js already has a push + notificationclick handler.
    const reg=await navigator.serviceWorker.register('/app-sw.js');
    await navigator.serviceWorker.ready;
    // Track admin state in localStorage so it's independent of the native
    // browser subscription — the same endpoint can be registered for both
    // public and admin audiences as separate DB rows.
    if(localStorage.getItem('gf_admin_push')==='on'){
      const sub=await reg.pushManager.getSubscription();
      if(sub){
        await fetch('/.netlify/functions/delete-subscription',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:sub.endpoint,audience:'admin'})}).catch(()=>{});
      }
      localStorage.removeItem('gf_admin_push');
      updateAdminPushBtn(false);
      toast('Admin notifications disabled','success');
      return;
    }
    // Turn ON: reuse existing native sub if present; otherwise create one.
    // Never unsubscribe here — we want public push to keep working.
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){toast('Permission denied','error');return}
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});
    }
    const res=await fetch('/.netlify/functions/save-subscription',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...sub.toJSON(),audience:'admin'})});
    if(!res.ok){toast('Save failed: '+res.status,'error');return}
    localStorage.setItem('gf_admin_push','on');
    updateAdminPushBtn(true);
    toast('Admin notifications enabled','success');
  }catch(e){
    console.error('[Push]',e);
    toast('Push setup failed: '+e.message,'error');
  }
}

async function checkPushStatus(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
  // Source of truth for the admin toggle is localStorage — the native sub may
  // exist independently for public push. Still confirm a native sub is alive;
  // if it's gone the admin row is stale and we should reset the flag.
  if(localStorage.getItem('gf_admin_push')!=='on'){updateAdminPushBtn(false);return}
  try{
    const reg=await navigator.serviceWorker.getRegistration('/app-sw.js');
    if(!reg){updateAdminPushBtn(false);return}
    const sub=await reg.pushManager.getSubscription();
    if(!sub){localStorage.removeItem('gf_admin_push');updateAdminPushBtn(false);return}
    updateAdminPushBtn(true);
  }catch(e){updateAdminPushBtn(false)}
}
