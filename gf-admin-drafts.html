<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridFeed Admin — Draft Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #F5F5F5; --card: #fff; --accent: #E8002D; --text: #1B1F2A;
      --dim: #4A4E5A; --muted: #8A8E9A; --border: #E0E0E8; --green: #16A34A; --red: #DC2626;
      --blue: #2563EB;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.5; padding: 20px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header .badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 3px; }
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .section-heading { font-size: 18px; font-weight: 700; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .section-heading .count-badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .draft-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
    .draft-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .draft-title { font-weight: 700; font-size: 15px; flex: 1; }
    .draft-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px; background: #EFF6FF; color: #1E40AF; }
    .draft-status { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px; }
    .status-pending { background: #FEF3C7; color: #92400E; }
    .status-approved { background: #DCFCE7; color: #166534; }
    .status-rejected, .status-failed { background: #FEE2E2; color: #991B1B; }
    .status-posted { background: #DCFCE7; color: #166534; }
    .draft-body { padding: 16px 18px; font-size: 13px; color: var(--dim); white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    .draft-meta { display: flex; align-items: center; gap: 12px; padding: 10px 18px; background: #FAFAFA; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); flex-wrap: wrap; }
    .draft-actions { display: flex; gap: 8px; margin-left: auto; }
    .btn { padding: 6px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-approve:hover { background: #15803D; }
    .btn-reject { background: var(--red); color: #fff; }
    .btn-reject:hover { background: #B91C1C; }
    .btn-edit { background: var(--border); color: var(--text); }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 18px; min-width: 100px; }
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff; padding: 12px 20px; border-radius: 6px; font-size: 13px; font-weight: 500; display: none; z-index: 100; }
    .toast.show { display: block; }

    /* Tweet card styles */
    .tweet-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
    .tweet-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .tweet-article-link { font-size: 12px; color: var(--blue); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tweet-body { padding: 14px 16px; }
    .tweet-text { font-size: 14px; color: var(--text); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .tweet-text-edit { width: 100%; min-height: 60px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 14px; resize: vertical; display: none; }
    .tweet-char-count { font-size: 11px; margin-top: 6px; font-weight: 600; }
    .tweet-char-ok { color: var(--muted); }
    .tweet-char-warn { color: #F59E0B; }
    .tweet-char-over { color: var(--red); }
    .tweet-meta { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #FAFAFA; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }
    .tweet-posted-check { color: var(--green); font-weight: 700; }

    /* Modal for editing drafts */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 50; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); border-radius: 8px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; padding: 24px; }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--dim); }
    .modal input, .modal textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 13px; margin-bottom: 12px; }
    .modal textarea { min-height: 200px; resize: vertical; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  </style>
</head>
<body>

<div class="header">
  <h1>GridFeed Admin</h1>
  <span class="badge">DRAFT QUEUE</span>
</div>

<div class="stats" id="stats"></div>

<!-- ═══════ ARTICLE DRAFTS ═══════ -->
<div class="section-heading">Article Drafts <span class="count-badge" id="draftCountBadge">0</span></div>

<div class="filters" id="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
  <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
  <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
</div>

<div id="draftsList"></div>

<!-- ═══════ TWEETS ═══════ -->
<div class="section-heading">Tweets <span class="count-badge" id="tweetCountBadge">0</span></div>

<div class="filters" id="tweetFilters">
  <button class="filter-btn active" onclick="setTweetFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setTweetFilter('pending', this)">Pending</button>
  <button class="filter-btn" onclick="setTweetFilter('approved', this)">Approved</button>
  <button class="filter-btn" onclick="setTweetFilter('posted', this)">Posted</button>
  <button class="filter-btn" onclick="setTweetFilter('failed', this)">Failed</button>
</div>

<div id="tweetsList"></div>

<div class="toast" id="toast"></div>

<!-- Edit Draft Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Edit Draft</h2>
    <input type="hidden" id="editId" />
    <label>Title</label>
    <input type="text" id="editTitle" />
    <label>Excerpt</label>
    <input type="text" id="editExcerpt" />
    <label>Body</label>
    <textarea id="editBody"></textarea>
    <div class="modal-actions">
      <button class="btn btn-edit" onclick="closeModal()">Cancel</button>
      <button class="btn btn-approve" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
'use strict';

const SUPABASE_URL = 'https://jrkptskwmdtbcucmqwft.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impya3B0c2t3bWR0YmN1Y21xd2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTY2MTksImV4cCI6MjA5MTMzMjYxOX0.oz9DUA4YtwxtJLbL-fpYTC9VstJ0B-tNC0B3wwiyRtk';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allDrafts = [];
let allTweets = [];
let articleMap = {};
let currentFilter = 'all';
let tweetFilter = 'all';

/* ═══════ LOAD DATA ═══════ */
async function loadAll() {
  await Promise.all([loadDrafts(), loadTweets()]);
  renderStats();
}

async function loadDrafts() {
  const { data, error } = await sb
    .from('content_drafts')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error('Failed to load drafts:', error);
    document.getElementById('draftsList').innerHTML = '<div class="empty">Failed to load drafts.</div>';
    return;
  }
  allDrafts = data || [];
  renderDrafts();
}

async function loadTweets() {
  // Load tweets with article info
  const { data: tweets, error } = await sb
    .from('tweets')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error('Failed to load tweets:', error);
    document.getElementById('tweetsList').innerHTML = '<div class="empty">Failed to load tweets.</div>';
    return;
  }
  allTweets = tweets || [];

  // Load article titles for linked tweets
  const articleIds = [...new Set(allTweets.filter(t => t.article_id).map(t => t.article_id))];
  if (articleIds.length) {
    const { data: articles } = await sb
      .from('articles')
      .select('id, title, slug')
      .in('id', articleIds);
    articleMap = {};
    (articles || []).forEach(a => { articleMap[a.id] = a; });
  }

  renderTweets();
}

/* ═══════ STATS ═══════ */
function renderStats() {
  const draftPending = allDrafts.filter(d => d.review_status === 'pending').length;
  const draftApproved = allDrafts.filter(d => d.review_status === 'approved').length;
  const draftRejected = allDrafts.filter(d => d.review_status === 'rejected').length;
  const tweetPending = allTweets.filter(t => t.status === 'pending').length;
  const tweetApproved = allTweets.filter(t => t.status === 'approved').length;
  const tweetPosted = allTweets.filter(t => t.status === 'posted').length;

  document.getElementById('draftCountBadge').textContent = draftPending;
  document.getElementById('tweetCountBadge').textContent = tweetPending;

  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="stat-num">${allDrafts.length}</div><div class="stat-label">Drafts</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#92400E;">${draftPending}</div><div class="stat-label">Drafts Pending</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green);">${draftApproved}</div><div class="stat-label">Drafts Approved</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--blue);">${allTweets.length}</div><div class="stat-label">Tweets</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#92400E;">${tweetPending}</div><div class="stat-label">Tweets Pending</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green);">${tweetPosted}</div><div class="stat-label">Tweets Posted</div></div>
  `;
}

/* ═══════ DRAFTS ═══════ */
function renderDrafts() {
  const el = document.getElementById('draftsList');
  let drafts = allDrafts;
  if (currentFilter !== 'all') {
    drafts = drafts.filter(d => d.review_status === currentFilter);
  }

  if (!drafts.length) {
    el.innerHTML = '<div class="empty">No drafts match this filter.</div>';
    return;
  }

  el.innerHTML = drafts.map(d => {
    const statusClass = `status-${d.review_status}`;
    const timeAgo = getTimeAgo(d.created_at);
    const isPublished = !!d.published_article_id;

    return `
      <div class="draft-card" id="draft-${d.id}">
        <div class="draft-header">
          <span class="draft-type">${d.content_type || 'draft'}</span>
          <span class="draft-title">${escapeHtml(d.title || 'Untitled')}</span>
          <span class="draft-status ${statusClass}">${d.review_status}${isPublished ? ' (published)' : ''}</span>
        </div>
        <div class="draft-body">${escapeHtml(d.body || '')}</div>
        <div class="draft-meta">
          <span>${timeAgo}</span>
          <span>${d.generation_model || ''}</span>
          ${d.tags?.length ? `<span>${d.tags.join(', ')}</span>` : ''}
          <div class="draft-actions">
            <button class="btn btn-edit" onclick="openEdit('${d.id}')">Edit</button>
            ${d.review_status === 'pending' ? `
              <button class="btn btn-approve" onclick="setDraftStatus('${d.id}', 'approved')">Approve</button>
              <button class="btn btn-reject" onclick="setDraftStatus('${d.id}', 'rejected')">Reject</button>
            ` : d.review_status === 'rejected' ? `
              <button class="btn btn-approve" onclick="setDraftStatus('${d.id}', 'approved')">Approve</button>
            ` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function setDraftStatus(id, status) {
  const { error } = await sb
    .from('content_drafts')
    .update({ review_status: status, reviewed_at: new Date().toISOString(), reviewed_by: 'admin' })
    .eq('id', id);
  if (error) { showToast('Error: ' + error.message); return; }
  showToast(`Draft ${status}`);
  await loadAll();
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('#filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDrafts();
}

function openEdit(id) {
  const draft = allDrafts.find(d => d.id === id);
  if (!draft) return;
  document.getElementById('editId').value = id;
  document.getElementById('editTitle').value = draft.title || '';
  document.getElementById('editExcerpt').value = draft.excerpt || '';
  document.getElementById('editBody').value = draft.body || '';
  document.getElementById('editModal').classList.add('active');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('active');
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const title = document.getElementById('editTitle').value;
  const excerpt = document.getElementById('editExcerpt').value;
  const body = document.getElementById('editBody').value;
  const { error } = await sb.from('content_drafts').update({ title, excerpt, body }).eq('id', id);
  if (error) { showToast('Error: ' + error.message); return; }
  closeModal();
  showToast('Draft saved');
  await loadAll();
}

/* ═══════ TWEETS ═══════ */
function charCountClass(len) {
  if (len > 280) return 'tweet-char-over';
  if (len > 260) return 'tweet-char-warn';
  return 'tweet-char-ok';
}

function renderTweets() {
  const el = document.getElementById('tweetsList');
  let tweets = allTweets;
  if (tweetFilter !== 'all') {
    tweets = tweets.filter(t => t.status === tweetFilter);
  }

  if (!tweets.length) {
    el.innerHTML = '<div class="empty">No tweets match this filter.</div>';
    return;
  }

  el.innerHTML = tweets.map(t => {
    const article = articleMap[t.article_id];
    const len = (t.tweet_text || '').length;
    const ccClass = charCountClass(len);
    const timeAgo = getTimeAgo(t.created_at);
    const isPosted = t.status === 'posted';
    const isPending = t.status === 'pending';
    const isApproved = t.status === 'approved';
    const isFailed = t.status === 'failed';

    return `
      <div class="tweet-card" id="tweet-${t.id}">
        <div class="tweet-header">
          <span class="draft-type">tweet</span>
          <span class="tweet-article-link">${article ? escapeHtml(article.title) : 'No linked article'}</span>
          <span class="draft-status status-${t.status}">${isPosted ? '&#10003; posted' : t.status}</span>
        </div>
        <div class="tweet-body">
          <div class="tweet-text" id="tweet-text-${t.id}" onclick="startTweetEdit('${t.id}')">${escapeHtml(t.tweet_text || '')}</div>
          <textarea class="tweet-text-edit" id="tweet-edit-${t.id}" oninput="updateTweetCharCount('${t.id}')" onblur="saveTweetEdit('${t.id}')" maxlength="300"></textarea>
          <div class="tweet-char-count ${ccClass}" id="tweet-cc-${t.id}">${len}/280</div>
        </div>
        <div class="tweet-meta">
          <span>${timeAgo}</span>
          ${isPosted && t.posted_at ? `<span class="tweet-posted-check">&#10003; Posted ${getTimeAgo(t.posted_at)}</span>` : ''}
          <div class="draft-actions">
            ${isPending ? `
              <button class="btn btn-approve" onclick="setTweetStatus('${t.id}', 'approved')">Approve</button>
              <button class="btn btn-reject" onclick="setTweetStatus('${t.id}', 'failed')">Reject</button>
            ` : isApproved ? `
              <span style="font-size:11px;color:var(--green);font-weight:600;">Queued for posting</span>
              <button class="btn btn-reject" onclick="setTweetStatus('${t.id}', 'failed')">Cancel</button>
            ` : isFailed ? `
              <button class="btn btn-approve" onclick="setTweetStatus('${t.id}', 'approved')">Retry</button>
            ` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function startTweetEdit(id) {
  const tweet = allTweets.find(t => t.id === id);
  if (!tweet || tweet.status === 'posted') return;
  const textEl = document.getElementById(`tweet-text-${id}`);
  const editEl = document.getElementById(`tweet-edit-${id}`);
  textEl.style.display = 'none';
  editEl.style.display = 'block';
  editEl.value = tweet.tweet_text || '';
  editEl.focus();
  updateTweetCharCount(id);
}

function updateTweetCharCount(id) {
  const editEl = document.getElementById(`tweet-edit-${id}`);
  const ccEl = document.getElementById(`tweet-cc-${id}`);
  const len = editEl.value.length;
  ccEl.textContent = `${len}/280`;
  ccEl.className = `tweet-char-count ${charCountClass(len)}`;
}

async function saveTweetEdit(id) {
  const editEl = document.getElementById(`tweet-edit-${id}`);
  const textEl = document.getElementById(`tweet-text-${id}`);
  const newText = editEl.value.trim();

  editEl.style.display = 'none';
  textEl.style.display = 'block';

  const tweet = allTweets.find(t => t.id === id);
  if (!tweet || newText === tweet.tweet_text) return;

  const { error } = await sb.from('tweets').update({ tweet_text: newText }).eq('id', id);
  if (error) { showToast('Error saving tweet: ' + error.message); return; }

  tweet.tweet_text = newText;
  textEl.textContent = newText;
  const len = newText.length;
  const ccEl = document.getElementById(`tweet-cc-${id}`);
  ccEl.textContent = `${len}/280`;
  ccEl.className = `tweet-char-count ${charCountClass(len)}`;
  showToast('Tweet saved');
}

async function setTweetStatus(id, status) {
  const { error } = await sb.from('tweets').update({ status }).eq('id', id);
  if (error) { showToast('Error: ' + error.message); return; }
  showToast(`Tweet ${status === 'approved' ? 'approved — will post next run' : status}`);
  await loadAll();
}

function setTweetFilter(filter, btn) {
  tweetFilter = filter;
  document.querySelectorAll('#tweetFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTweets();
}

/* ═══════ UTILS ═══════ */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getTimeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(diff / 3600000);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(diff / 86400000)}d ago`;
}

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ═══════ AUTH GATE ═══════
async function checkAuth() {
  const token = sessionStorage.getItem('gf_admin_token');
  if (!token) { window.location.href = '/admin-login'; return false; }

  try {
    const res = await fetch('/.netlify/functions/auth-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await res.json();
    if (!data.success) {
      sessionStorage.removeItem('gf_admin_token');
      window.location.href = '/admin-login';
      return false;
    }
    return true;
  } catch {
    window.location.href = '/admin-login';
    return false;
  }
}

checkAuth().then(ok => { if (ok) loadAll(); });
</script>
</body>
</html>
